<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Inside Hallandale Beach's Development Boom | The Real Deal</title>
    <meta name="description" content="A wave of towers, hotels and mixed-use projects is reshaping Hallandale Beach. An interactive map of the developments and the firms behind them." />

    <!-- Pre-paint boot snippet (trd_graphics core/boot-snippet.html). -->
    <script>
      (function () {
        var r = document.documentElement, p = null;
        try { p = new URLSearchParams(location.search); } catch (e) {}
        var framed;
        try { framed = window.self !== window.top; } catch (e) { framed = true; }
        if ((p && p.get("layout") === "embed") || framed) r.setAttribute("data-layout", "embed");
        var q = p && p.get("theme"), saved = null;
        if (r.getAttribute("data-layout") !== "embed") {
          try { saved = localStorage.getItem("sofla-hallandale-beach-developments-070726:theme"); } catch (e) {}
        }
        var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        r.setAttribute("data-theme", (q === "dark" || q === "light") ? q
          : (saved === "dark" || saved === "light") ? saved : (dark ? "dark" : "light"));
      })();
    </script>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet" />
    <link href="https://static.therealdeal.com/ProximaNovaFontFamily/ProximaNova/proxima-nova-all.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="trd-embed.css" />
    <link rel="stylesheet" href="trd-map.css" />
    <style>
      :root {
        --trd-embed-h: 680px;
        --trd-embed-h-phone: 680px;
        --trd-embed-h-wide: 580px;
        --story-w: 420px;
      }

      /* ---------- Hero (standalone only) ---------- */
      .hero { max-width: 820px; margin: 0 auto; padding: 54px 24px 26px; text-align: center; position: relative; }
      .hero-kicker { font-family: var(--trd-font-serif); font-weight: 700; font-style: italic; color: var(--trd-brand); letter-spacing: 0.02em; margin: 0 0 10px; font-size: 15px; }
      .hero h1 { font-family: var(--trd-font-serif); font-weight: 900; font-size: clamp(30px, 5vw, 46px); line-height: 1.06; letter-spacing: -0.015em; margin: 0 0 16px; }
      .hero-lede { font-size: 18px; line-height: 1.6; color: var(--trd-muted); margin: 0 auto; max-width: 640px; }
      .theme-toggle {
        position: absolute; top: 20px; right: 20px;
        display: inline-flex; align-items: center; gap: 7px;
        background: var(--trd-panel); color: var(--trd-text);
        border: 1px solid var(--trd-border); border-radius: 999px;
        padding: 7px 13px; font-size: 13px; font-weight: 700; cursor: pointer;
      }
      .theme-toggle:hover { background: var(--trd-bg-soft); }

      /* ---------- Layout ---------- */
      .layout { display: flex; align-items: flex-start; gap: 20px; max-width: 1240px; margin: 0 auto; padding: 8px 24px 60px; }
      .map-wrap {
        position: sticky; top: 16px; flex: 1 1 auto; min-width: 0;
        height: calc(100vh - 120px); min-height: 440px;
        border-radius: 12px; overflow: hidden; border: 1px solid var(--trd-border); box-shadow: var(--trd-shadow);
      }
      #map { position: absolute; inset: 0; }

      .story-wrap { flex: 0 0 var(--story-w); }
      .story { display: flex; flex-direction: column; gap: 14px; }

      .step {
        background: var(--trd-panel); border: 1px solid var(--trd-border);
        border-left: 4px solid var(--trd-border); border-radius: 10px;
        padding: 16px 18px; cursor: pointer;
        transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      }
      .step:hover { transform: translateY(-1px); box-shadow: var(--trd-shadow); }
      .step.active {
        border-left-color: var(--trd-brand);
        box-shadow: var(--trd-shadow);
        background: color-mix(in srgb, var(--trd-brand) 7%, var(--trd-panel));
      }
      .step .kicker {
        display: flex; align-items: center; gap: 8px;
        font-size: 11px; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase;
        color: var(--trd-muted); margin: 0 0 8px;
      }
      .step .kicker .dot {
        width: 20px; height: 20px; border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        background: var(--trd-brand); color: #fff; font-size: 11px; font-weight: 800;
      }
      .step .proj { font-family: var(--trd-font-serif); font-weight: 900; font-size: 19px; line-height: 1.18; margin: 0 0 4px; }
      .step .addr { font-size: 12.5px; color: var(--trd-muted); margin: 0 0 10px; }
      .step .desc { font-size: 14px; line-height: 1.5; margin: 0 0 10px; }
      .step .dev { font-size: 12px; color: var(--trd-muted); margin: 0; padding-top: 8px; border-top: 1px dashed var(--trd-border); }
      .step .dev b { color: var(--trd-text); font-weight: 700; }

      /* ---------- Responsive (standalone) ---------- */
      @media (max-width: 900px) {
        .layout { flex-direction: column; padding: 8px 16px 48px; }
        .map-wrap { position: sticky; top: 0; height: 52vh; border-radius: 0; margin: 0 -16px; width: calc(100% + 32px); }
        .story-wrap { flex: 1 1 auto; width: 100%; }
        .hero { padding: 34px 18px 18px; }
      }

      /* =====================================================================
         EMBED MODE — fixed pixel heights only (no vh/svh). See toolkit README.
         ===================================================================== */
      :root[data-layout="embed"] .layout {
        position: relative; display: block; padding: 0; max-width: none; overflow: hidden;
      }
      :root[data-layout="embed"] .map-wrap {
        position: absolute; top: 0; left: 0; right: 0; bottom: auto;
        height: 300px; border-radius: 0; border: none; box-shadow: none; margin: 0; width: auto;
      }
      :root[data-layout="embed"] .story-wrap {
        position: absolute; top: 300px; left: 0; right: 0; bottom: 0;
        width: auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
        padding: 12px; border-top: 1px solid var(--trd-border);
      }
      @media (max-width: 560px) {
        :root[data-layout="embed"] .map-wrap { height: 260px; }
        :root[data-layout="embed"] .story-wrap { top: 260px; }
      }
      @media (min-width: 780px) {
        :root[data-layout="embed"] .map-wrap { position: absolute; inset: 0; height: var(--trd-embed-h-wide); }
        :root[data-layout="embed"] .story-wrap {
          position: absolute; top: 0; right: 0; bottom: 0; left: auto;
          width: 380px; padding: 14px; overflow-y: auto;
          background: color-mix(in srgb, var(--trd-panel) 88%, transparent);
          backdrop-filter: blur(6px);
          border-top: none; border-left: 1px solid var(--trd-border);
        }
      }
    </style>
  </head>
  <body>
    <header class="hero trd-standalone-only">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span aria-hidden="true">☾</span><span>Dark</span>
      </button>
      <p class="hero-kicker">The Real Deal Interactive</p>
      <h1>Inside Hallandale Beach's Development Boom</h1>
      <p class="hero-lede">
        Towers, hotels and mixed-use projects are reshaping this small Broward County
        city. Click a project to see who's building it and what's planned.
      </p>
    </header>

    <main class="layout trd-embed-fill">
      <section class="map-wrap trd-map" aria-label="Map of Hallandale Beach developments">
        <div id="map" role="application" aria-label="Map"></div>
      </section>
      <section class="story-wrap" aria-label="Developments">
        <div class="story" id="story" role="list"></div>
      </section>
    </main>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
    <script src="trd-embed.js"></script>
    <script src="trd-map.js"></script>
    <script>
      var TOKEN = "pk.eyJ1IjoidHJkZGF0YSIsImEiOiJjamc2bTc2YmUxY2F3MnZxZGh2amR2MTY5In0.QlOWqB-yQNrNlXD0KQ9IvQ";

      // Single brand accent for pins (matches the theme-aware --trd-brand token).
      var ACCENT = { light: "#27509b", dark: "#6e92d8" };
      var EMPTY = { type: "FeatureCollection", features: [] };

      var mapApi = null, FEATURES = [], activeN = null;
      var storyEl = document.getElementById("story");

      function buildCards() {
        storyEl.innerHTML = "";
        FEATURES.forEach(function (f) {
          var p = f.properties;
          var el = document.createElement("article");
          el.className = "step";
          el.dataset.n = p.n;
          el.setAttribute("role", "listitem");
          el.setAttribute("tabindex", "0");
          el.innerHTML =
            '<p class="kicker"><span class="dot">' + p.n + "</span>" +
            p.n + " of " + FEATURES.length + "</p>" +
            '<h3 class="proj">' + esc(p.project) + "</h3>" +
            '<p class="addr">' + esc(p.address) + "</p>" +
            '<p class="desc">' + esc(p.description) + "</p>" +
            (p.developer ? '<p class="dev"><b>Developer:</b> ' + esc(p.developer) + "</p>" : "");
          el.addEventListener("click", function () { activate(p.n, true); });
          el.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activate(p.n, true); }
          });
          storyEl.appendChild(el);
        });
      }

      function featureByN(n) {
        for (var i = 0; i < FEATURES.length; i++)
          if (FEATURES[i].properties.n === n) return FEATURES[i];
        return null;
      }

      function setActiveSource(feature) {
        if (!mapApi || !mapApi.map) return;
        var src = mapApi.map.getSource("active");
        if (src) src.setData(feature ? { type: "FeatureCollection", features: [feature] } : EMPTY);
      }

      function activate(n, fromClick) {
        var f = featureByN(n);
        if (!f) return;
        activeN = n;
        Array.prototype.forEach.call(storyEl.children, function (el) {
          var on = String(el.dataset.n) === String(n);
          el.classList.toggle("active", on);
          if (on) el.scrollIntoView({ behavior: prefersReduce() ? "auto" : "smooth", block: "nearest" });
        });
        if (mapApi && mapApi.map) {
          mapApi.flyTo(f.geometry.coordinates, { zoom: 15.5 });
          setActiveSource(f);
        }
      }

      function prefersReduce() {
        return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }
      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }

      function addLayers(map, c) {
        var color = ACCENT[c.theme] || ACCENT.light;
        if (!map.getSource("devs")) map.addSource("devs", { type: "geojson", data: c.data });
        if (!map.getSource("active")) map.addSource("active", { type: "geojson", data: EMPTY });

        if (!map.getLayer("active-glow"))
          map.addLayer({ id: "active-glow", type: "circle", source: "active",
            paint: { "circle-radius": 30, "circle-color": color, "circle-opacity": 0.18 } });
        if (!map.getLayer("points"))
          map.addLayer({ id: "points", type: "circle", source: "devs",
            paint: { "circle-radius": 14, "circle-color": color, "circle-stroke-color": "#ffffff", "circle-stroke-width": 2.5 } });
        if (!map.getLayer("active-ring"))
          map.addLayer({ id: "active-ring", type: "circle", source: "active",
            paint: { "circle-radius": 15, "circle-opacity": 0, "circle-stroke-color": "#ffffff", "circle-stroke-width": 3.5 } });
        if (!map.getLayer("point-num"))
          map.addLayer({ id: "point-num", type: "symbol", source: "devs",
            layout: { "text-field": ["to-string", ["get", "n"]], "text-font": ["Open Sans Bold", "Arial Unicode MS Bold"], "text-size": 13, "text-allow-overlap": true },
            paint: { "text-color": "#ffffff" } });
      }

      var controller = TRDEmbed({
        prefix: "sofla-hallandale-beach-developments-070726",
        themeKey: "sofla-hallandale-beach-developments-070726:theme",
        toggle: "#themeToggle",
        mountTarget: "#map",
        onMount: function (ctx) {
          TRDMap.loadGeoJSON("data.geojson").then(function (GEO) {
            FEATURES = GEO.features.slice().sort(function (a, b) { return a.properties.n - b.properties.n; });
            buildCards();

            mapApi = TRDMap.create({
              container: "map",
              token: TOKEN,
              theme: ctx.theme,
              embed: ctx.isEmbed,
              data: GEO,
              bounds: TRDMap.boundsOf(GEO),
              fitBoundsOptions: { padding: ctx.isEmbed ? 60 : 90, maxZoom: 15 },
              overlayWidth: 380,
              cooperativeGestures: ctx.isEmbed,
              interactiveLayers: ["points", "point-num"],
              addLayers: addLayers,
              onFeatureClick: function (feature) {
                if (feature && feature.properties) activate(feature.properties.n, true);
              },
            });

            mapApi.on("style", function () {
              if (activeN != null) setActiveSource(featureByN(activeN));
            });
            mapApi.on("loaded", function () {
              activate(FEATURES[0].properties.n, false);
              ctx.postLoaded();
            });
          }).catch(function (e) {
            console.error("Could not load data.geojson", e);
            storyEl.innerHTML = '<div class="step">Data failed to load.</div>';
          });
        },
        onTheme: function (theme, ctx) {
          if (mapApi) mapApi.setTheme(theme);
          ctx.requestResize();
        },
      });
    </script>
  </body>
</html>
