<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cook County — New Single Family Residences</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --panel-w: 380px;
      --panel-pad: 16px;
      --panel-radius: 14px;
      --panel-bg: rgba(255,255,255,0.96);
      --panel-border: #d8d8d8;
      --shadow: 0 10px 26px rgba(0,0,0,.14);
      --text: #111;
      --muted: #666;
      --row-hover: #f4f6f8;
      --blue: #2d6cff;
    }

    html, body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #wrap { position: relative; height: 100%; width: 100%; }
    #map  { position: absolute; inset: 0; }

    .leaflet-tile { filter: grayscale(35%) brightness(1.06); }

    #panel{
      position: absolute;
      top: var(--panel-pad);
      right: var(--panel-pad);
      z-index: 1000;

      width: var(--panel-w);
      max-width: calc(100vw - (var(--panel-pad) * 2));

      max-height: calc(100svh - (var(--panel-pad) * 2));
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--panel-radius);
      box-shadow: var(--shadow);
      overflow: hidden;

      display: flex;
      flex-direction: column;
      backdrop-filter: blur(6px);
    }

    #panel header{
      padding: 12px 14px 10px 14px;
      border-bottom: 1px solid #ececec;
      background: linear-gradient(to bottom, rgba(255,255,255,.98), rgba(255,255,255,.92));
    }

    #panel header .h1{
      font-weight: 900;
      font-size: 16px;
      letter-spacing: .03em;
      line-height: 1.15;
    }

    #panel header .hint{
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    #list{
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .row{
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      background: transparent;
    }
    .row:hover{ background: var(--row-hover); }

    .badge{
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 13px;
      border: 2px solid rgba(0,0,0,0.15);
      margin-top: 2px;
      background: var(--blue);
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .row .name{
      font-weight: 900;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .row .meta{
      margin-top: 4px;
      font-size: 12px;
      color: #555;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .num-marker{
      width: 32px;
      height: 32px;
      border-radius: 999px;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 14px;
      border: 2px solid rgba(0,0,0,0.35);
      box-shadow: 0 6px 14px rgba(0,0,0,0.18);
      background: var(--blue);
    }

    .leaflet-popup-content{
      margin: 10px 12px;
      font-family: inherit;
    }
    .leaflet-popup-content-wrapper{
      border-radius: 12px;
    }
    .leaflet-popup-close-button{
      padding: 8px 8px 0 0;
    }

    .leaflet-control-zoom a{
      border-radius: 10px;
    }

    @media (max-width: 720px){
      #panel{
        left: var(--panel-pad);
        right: var(--panel-pad);
        top: auto;
        bottom: var(--panel-pad);
        width: auto;
        max-height: 44svh;
      }
      #panel header .h1{
        font-size: 14px;
        letter-spacing: .02em;
      }
    }
  </style>
</head>

  function esc(s) {
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;');
  }

  function popupHtml(p) {
    const rows = [];
    const showOrder = [
      "Parcel ID","Address","Address_2","Owner",
      "Construction cost","Year permitted","Notes"
    ];
    for (const k of showOrder) {
      const v = p[k];
      if (v === null || v === undefined || v === '') continue;
      rows.push(`<tr>
        <th style="text-align:left;vertical-align:top;padding:4px 10px 4px 0;color:#444;white-space:nowrap;">${esc(k)}</th>
        <td style="padding:4px 0;color:#111;">${esc(v)}</td>
      </tr>`);
    }
    const title = p["Address"] || "Property";
    return `<div style="min-width:260px">
      <div style="font-weight:900;font-size:16px;margin-bottom:6px;">${esc(title)} <span style="color:#666;font-weight:800;">#${p.id}</span></div>
      <table style="border-collapse:collapse;font-size:12px;line-height:1.25;">${rows.join('')}</table>
    </div>`;
  }

  // Fit bounds safely
  if (geo.features && geo.features.length) {
    const latlngs = geo.features.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]);
    const bounds = L.latLngBounds(latlngs);
    map.fitBounds(bounds.pad(0.15));
  } else {
    map.setView([41.88, -87.63], 10);
  }

  geo.features.forEach((f) => {
    const p = f.properties;
    const lat = f.geometry.coordinates[1];
    const lon = f.geometry.coordinates[0];

    const icon = L.divIcon({
      className: '',
      html: `<div class="num-marker">${p.id}</div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    const marker = L.marker([lat, lon], { icon }).addTo(map);
    marker.bindPopup(popupHtml(p), { maxWidth: 460 });

    const addrLine = [p["Address"], p["Address_2"]].filter(Boolean).join(" ");
    const notes = p["Notes"] ? String(p["Notes"]) : "";

    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="badge">${p.id}</div>
      <div>
        <div class="name">${esc(p["Address"] || "Property")}</div>
        <div class="meta">${esc(addrLine)}${notes ? `<br/>${esc(notes)}` : ''}</div>
      </div>
    `;
    row.addEventListener('click', () => {
      map.flyTo([lat, lon], Math.max(map.getZoom(), 16), { duration: 0.8 });
      marker.openPopup();
    });
    list.appendChild(row);
  });
