<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Extell Assemblage Scrollytelling Map</title>
    <meta
      name="description"
      content="Scrollytelling map of Extell property acquisitions with purchase amounts."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="hero">
      <h1>Extell's Acquisition Trail</h1>
      <p>
        Click a card to see the location of each acquisition on the map, along with details about the purchase. Scroll down to see all acquisitions in chronological order.
      </p>
    </header>

    <main class="layout">
      <section class="map-wrap" aria-label="Map section">
        <div id="map" role="application" aria-label="Map of Extell acquisitions"></div>
        <div class="map-legend" id="mapLegend" aria-label="Map legend">
          <button
            type="button"
            class="legend-toggle"
            id="legendToggle"
            aria-expanded="false"
            aria-controls="legendBody"
          >
            <span>Legend</span>
            <span aria-hidden="true">▾</span>
          </button>
          <div class="legend-body" id="legendBody">
            <p class="legend-title">Legend</p>
          </div>
        </div>
      </section>

      <section class="story-wrap" aria-label="Story">
        <section class="story" id="story" aria-label="Story steps">
        </section>
      </section>
    </main>

    <template id="stepTemplate">
      <article class="step" data-step="record">
        <p class="step-kicker"></p>
        <h3 class="step-title"></h3>
        <p class="step-meta"></p>
        <p class="step-amount"></p>
        <details class="step-details">
          <summary>More Details</summary>
          <p class="step-detail"></p>
          <a class="step-link" target="_blank" rel="noopener noreferrer">source document</a>
        </details>
      </article>
    </template>

    <div class="token-warning" id="tokenWarning" hidden>
      <h2>Mapbox token required</h2>
      <p>
        Open script.js and set MAPBOX_ACCESS_TOKEN so the interactive map can load.
      </p>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <script src="script.js"></script>
  </body>
</html>
