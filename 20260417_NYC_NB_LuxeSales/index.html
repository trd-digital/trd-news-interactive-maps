<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Manhattan Neighborhood Median Sale Price Choropleth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
    rel="stylesheet"/>

  <!-- Stylesheet -->
<link href="style.css" rel="stylesheet">

</head>
  
<body>
  <div class="map-wrapper">
    <h3><b>How $10M+ home prices shift across NYC neighborhoods</b></h3>
    <h4>Track how top-dollar enclaves change over time using the slider below</h4>

    <div class="map-container">
      <div id="map"></div>

      <div class="legend">
        <div><strong>Median sale price</strong></div>
        <div class="legend-scale">
          <span style="background:#f7fbff"></span>
          <span style="background:#deebf7"></span>
          <span style="background:#c6dbef"></span>
          <span style="background:#9ecae1"></span>
          <span style="background:#6baed6"></span>
          <span style="background:#3182bd"></span>
          <span style="background:#08519c"></span>
        </div>
        <div class="legend-labels">
          <span>$10M</span>
          <span>$23M</span>
        </div>
      </div>

      <div class="controls">
        <div class="controls-row">
          <label for="year-slider"><strong>Year</strong></label>
          <input
            id="year-slider"
            type="range"
            min="2021"
            max="2025"
            step="1"
            value="2021"
          />
        </div>

        <div class="year-ticks">
          <span>2021</span>
          <span>2022</span>
          <span>2023</span>
          <span>2024</span>
          <span>2025</span>
        </div>
      </div>
    </div>

    <div class="map-credit">Map by Joseph Jungermann</div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
  <script src="data/nyc_luxe_nb_median_price.js"></script>
  <script src="map.js"></script>

</body>
</html>
