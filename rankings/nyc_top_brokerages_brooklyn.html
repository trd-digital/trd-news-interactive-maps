<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brooklyn Top Broker Ranking</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div id="chart" class="chart-container"></div>
    </div>

    <!-- Configuration for the chart -->
    <script>
      window.chartConfig = {
        csvFile: "data/brooklyn_top_brokerages.csv",
        title: "Brooklyn Top Brokerages Ranking",
        containerId: "chart",
      };
    </script>

    <!-- Load the reusable chart library -->
    <script src="chart.js"></script>
  </body>
</html>
