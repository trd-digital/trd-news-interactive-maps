<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRD embed harness</title>
    <style>
      /* Mimic TRD's article column: ~1040px desktop, narrower on phones. */
      body { margin: 0; font-family: system-ui, sans-serif; background: #eceff4; }
      body.theme-dark { background: #0b0d12; color: #eee; }
      .article { max-width: 1040px; margin: 0 auto; padding: 32px 20px; }
      .prose { font-size: 18px; line-height: 1.7; color: inherit; }
      .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
      .bar button { padding: 8px 14px; border: 1px solid #999; border-radius: 6px; background: #fff; cursor: pointer; }
      figure { margin: 28px 0; }
      code { background: rgba(0,0,0,.08); padding: 1px 5px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div class="article">
      <div class="bar">
        <button id="theme">Toggle site theme</button>
        <span>Simulates TRD's light/dark switch (toggles <code>.theme-dark</code> on &lt;html&gt;).</span>
      </div>
      <p class="prose">Article text above the embed. Scroll down — the iframe should
        lazily mount, auto-size to its content, and mirror the theme toggle above.</p>

      <!-- Paste embed-snippet.template.html here, pointed at the starter. -->
      <figure>
        <iframe
          id="trd-embed"
          src="starter/index.html?layout=embed"
          title="TRD interactive graphic"
          loading="lazy"
          scrolling="no"
          style="width:100%;height:360px;min-height:200px;border:0;display:block;background:#fff;"
        ></iframe>
      </figure>

      <p class="prose">Article text below the embed.</p>
    </div>

    <script>
      var PREFIX = "trd-starter";
      var T = {
        READY: PREFIX + ":ready", RESIZE: PREFIX + ":resize",
        SET_THEME: PREFIX + ":set-theme", REQUEST_RESIZE: PREFIX + ":request-resize",
      };
      var iframe = document.getElementById("trd-embed");
      function siteTheme() {
        return document.documentElement.classList.contains("theme-dark") ? "dark" : "light";
      }
      function push() {
        try { iframe.contentWindow.postMessage({ type: T.SET_THEME, value: siteTheme() }, "*"); } catch (e) {}
      }
      window.addEventListener("message", function (ev) {
        var d = ev.data; if (!d || !d.type) return;
        if (d.type === T.READY) { push(); }
        if (d.type === T.RESIZE && typeof d.height === "number" && d.height > 100 && d.height < 5000) {
          iframe.style.height = d.height + "px";
          console.log("[harness] resize →", d.height);
        }
      });
      document.getElementById("theme").addEventListener("click", function () {
        document.documentElement.classList.toggle("theme-dark");
        document.body.classList.toggle("theme-dark");
        push();
      });
      new MutationObserver(push).observe(document.documentElement, { attributes: true, attributeFilter: ["class"] });
    </script>
  </body>
</html>
